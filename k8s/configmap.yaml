apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-task-config
  namespace: ai-task-platform
data:
  PORT: "5000"
  MONGO_URI: "mongodb://mongo:27017/ai_task_platform"
  REDIS_HOST: "redis"
