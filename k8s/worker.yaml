apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: ai-task-platform
  labels:
    app: worker
spec:
  replicas: 3
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: REGISTRY/ai-task-worker:IMAGE_TAG
          envFrom:
            - configMapRef:
                name: ai-task-config
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          # Workers have no HTTP server; liveness is a process-level check.
          livenessProbe:
            exec:
              command: ["python", "-c", "import socket; socket.create_connection(('redis', 6379), timeout=3)"]
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            exec:
              command: ["python", "-c", "import socket; socket.create_connection(('redis', 6379), timeout=3)"]
            initialDelaySeconds: 10
            periodSeconds: 15
