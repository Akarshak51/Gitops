apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-task-platform
  namespace: argocd
spec:
  project: default
  source:
    # Point this at your separate Infrastructure Repository (holds k8s/ manifests)
    repoURL: https://github.com/YOUR_ORG/ai-task-platform-infra.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: ai-task-platform
  syncPolicy:
    automated:
      prune: true      # remove resources that are no longer in git
      selfHeal: true    # revert manual cluster edits back to match git (Auto Sync)
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 10s
        factor: 2
        maxDuration: 3m
